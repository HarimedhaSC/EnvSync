services:
  postgres:
    image: postgres:16-alpine
    container_name: envsync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: envsync
      POSTGRES_PASSWORD: envsync_secret
      POSTGRES_DB: envsync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envsync -d envsync_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: envsync_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
